<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 职业风险敞口图谱 · 821个中国岗位</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --bg:#08090f;
  --bg2:#0d1117;
  --bg3:#111820;
  --bg4:#162030;
  --border:#1e2d40;
  --border2:#253850;
  --text:#d4dde8;
  --text2:#8a9ab8;
  --text3:#4a5a70;
  --acc:#3b82f6;
  --acc2:#60a5fa;
  --red:#ef4444;
  --yellow:#f59e0b;
  --green:#22c55e;
  --font:'Noto Sans SC',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}

/* HEADER */
.hdr{
  height:58px;display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;position:sticky;top:0;z-index:200;
  background:rgba(8,9,15,0.96);border-bottom:1px solid var(--border);
  backdrop-filter:blur(12px);
}
.hdr-left{display:flex;align-items:center;gap:14px;}
.hdr-badge{
  background:linear-gradient(135deg,#1d4ed8,#7c3aed);
  border-radius:8px;padding:6px 10px;font-size:16px;line-height:1;
}
.hdr-title{font-size:15px;font-weight:700;color:#fff;letter-spacing:.3px;}
.hdr-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.hdr-stats{display:flex;gap:20px;}
.hdr-stat .v{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--acc2);}
.hdr-stat .l{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;}

/* LAYOUT */
.wrap{display:flex;height:calc(100vh - 58px);}

/* SIDEBAR */
.sidebar{
  width:260px;min-width:260px;
  background:var(--bg2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;
}
.sb-body{flex:1;overflow-y:auto;overflow-x:hidden;}
.sb-body::-webkit-scrollbar{width:3px;}
.sb-body::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.sb-section{padding:12px 14px;border-bottom:1px solid var(--border);}
.sb-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}

/* Search */
.search-wrap{position:relative;}
.search-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:13px;color:var(--text3);}
.search-inp{
  width:100%;padding:7px 9px 7px 28px;
  background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;color:var(--text);font-size:12px;outline:none;
  font-family:var(--font);transition:border-color .15s;
}
.search-inp:focus{border-color:var(--acc);}
.search-inp::placeholder{color:var(--text3);}

/* Legend */
.legend-bar{height:8px;border-radius:4px;background:linear-gradient(90deg,#22c55e,#f59e0b,#ef4444);margin-bottom:5px;}
.legend-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);}

/* Stats box */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.stat-box{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:6px;padding:8px 10px;
}
.stat-box .v{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--acc2);}
.stat-box .l{font-size:10px;color:var(--text3);margin-top:2px;}

/* Distribution */
.dist{margin-top:8px;}
.dist-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;}
.dist-num{font-family:var(--mono);font-size:9px;color:var(--text3);width:14px;text-align:right;}
.dist-bg{flex:1;height:6px;background:var(--bg4);border-radius:3px;overflow:hidden;}
.dist-fill{height:100%;border-radius:3px;transition:width .4s;}
.dist-cnt{font-size:9px;color:var(--text3);width:24px;}

/* Categories */
.cat-all,.cat-item{
  display:flex;align-items:center;gap:8px;
  padding:6px 8px;border-radius:5px;cursor:pointer;
  transition:background .12s;border:1px solid transparent;
  margin-bottom:2px;
}
.cat-all:hover,.cat-item:hover{background:var(--bg3);}
.cat-all.active,.cat-item.active{background:var(--bg4);border-color:var(--border2);}
.cat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.cat-name{font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cat-meta{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.cat-cnt{font-size:10px;color:var(--text3);}
.cat-avg{font-size:10px;font-weight:700;font-family:var(--mono);}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* Toolbar */
.toolbar{
  padding:8px 14px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;background:var(--bg2);flex-shrink:0;
}
.view-btn{
  padding:5px 12px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--text3);font-size:11px;cursor:pointer;
  transition:all .12s;font-family:var(--font);
}
.view-btn.act{background:var(--bg4);border-color:var(--border2);color:var(--acc2);}
.sort-sel{
  padding:5px 8px;border-radius:5px;border:1px solid var(--border);
  background:var(--bg3);color:var(--text2);font-size:11px;outline:none;cursor:pointer;
  font-family:var(--font);
}
.tb-status{font-size:11px;color:var(--text3);margin-left:auto;}
.tb-hint{font-size:10px;color:var(--text3);background:var(--bg3);padding:3px 8px;border-radius:10px;border:1px solid var(--border);}

/* TREEMAP */
#tm-wrap{flex:1;overflow:hidden;position:relative;}
#tm-svg{display:block;}
.tm-cell{cursor:pointer;}
.tm-cell rect{transition:opacity .12s;}
.tm-cell:hover rect{opacity:.75!important;}

/* TABLE */
#tbl-wrap{flex:1;overflow-y:auto;display:none;}
#tbl-wrap::-webkit-scrollbar{width:5px;}
#tbl-wrap::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
.dtable{width:100%;border-collapse:collapse;}
.dtable th{
  position:sticky;top:0;z-index:10;background:var(--bg2);
  padding:9px 14px;text-align:left;font-size:10px;font-weight:600;
  color:var(--text3);text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid var(--border);cursor:pointer;
  font-family:var(--font);
}
.dtable th:hover{color:var(--acc2);}
.dtable td{padding:8px 14px;border-bottom:1px solid rgba(30,45,64,.5);font-size:12px;color:var(--text2);}
.dtable tr:hover td{background:rgba(13,17,23,.8);}
.score-chip{
  display:inline-flex;align-items:center;justify-content:center;
  width:32px;height:20px;border-radius:4px;
  font-size:11px;font-weight:700;color:#fff;font-family:var(--mono);
}
.risk-bar-row{display:flex;align-items:center;gap:7px;}
.risk-bar-bg{flex:1;height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;}
.risk-bar-f{height:100%;border-radius:2px;}

/* TOOLTIP */
.tip{
  position:fixed;z-index:500;
  background:rgba(8,9,15,.97);border:1px solid var(--border2);
  border-radius:10px;padding:13px 15px;min-width:210px;max-width:280px;
  box-shadow:0 12px 40px rgba(0,0,0,.6);
  pointer-events:none;opacity:0;transition:opacity .12s;
}
.tip.on{opacity:1;}
.tip-name{font-size:14px;font-weight:700;color:#fff;margin-bottom:2px;}
.tip-cat{font-size:10px;color:var(--text3);margin-bottom:8px;}
.tip-score-row{display:flex;align-items:flex-end;gap:8px;margin-bottom:6px;}
.tip-score-n{font-family:var(--mono);font-size:28px;font-weight:700;line-height:1;}
.tip-score-l{font-size:11px;color:var(--text3);line-height:1.4;}
.tip-badge{
  font-size:11px;font-weight:600;padding:3px 9px;
  border-radius:10px;display:inline-block;margin-bottom:7px;
}
.tip-rat{font-size:11px;color:var(--text2);line-height:1.5;}
.tip-edit{font-size:10px;color:var(--text3);margin-top:6px;font-style:italic;}

/* DETAIL PANEL */
.detail{
  position:fixed;right:0;top:58px;
  width:300px;height:calc(100vh - 58px);
  background:var(--bg2);border-left:1px solid var(--border);
  padding:18px;overflow-y:auto;
  transform:translateX(100%);transition:transform .22s cubic-bezier(.4,0,.2,1);
  z-index:100;
}
.detail.open{transform:translateX(0);}
.detail::-webkit-scrollbar{width:3px;}
.detail::-webkit-scrollbar-thumb{background:var(--border2);}
.d-close{
  position:absolute;top:12px;right:12px;
  background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  width:26px;height:26px;border-radius:5px;cursor:pointer;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.d-close:hover{background:var(--bg4);}
.d-score-ring{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:26px;font-weight:700;color:#fff;
  margin:14px auto;border:3px solid;
}
.d-name{text-align:center;font-size:18px;font-weight:700;color:#fff;margin-bottom:3px;}
.d-cat{text-align:center;font-size:11px;color:var(--text3);margin-bottom:12px;}
.d-badge{
  display:block;text-align:center;padding:5px 16px;
  border-radius:16px;font-size:12px;font-weight:600;
  margin:0 auto 16px;width:fit-content;border:1px solid;
}
.d-sec{margin-bottom:14px;}
.d-sec-t{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;}
.d-sec-body{font-size:12px;color:var(--text2);line-height:1.7;}
.d-meter{display:flex;align-items:center;gap:8px;margin-top:6px;}
.d-meter-bg{flex:1;height:7px;background:var(--bg4);border-radius:4px;overflow:hidden;}
.d-meter-f{height:100%;border-radius:4px;}
.d-similar-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;
}
.d-similar-item:hover{opacity:.8;}

/* EDIT SCORE */
.d-edit-row{display:flex;align-items:center;gap:8px;margin-top:8px;}
.d-edit-label{font-size:11px;color:var(--text2);}
.d-edit-inp{
  width:50px;padding:4px 7px;border-radius:5px;
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);font-size:12px;font-family:var(--mono);outline:none;text-align:center;
}
.d-edit-inp:focus{border-color:var(--acc);}
.d-edit-btn{
  padding:4px 10px;background:var(--acc);border:none;border-radius:5px;
  color:#fff;font-size:11px;cursor:pointer;font-family:var(--font);
}
.d-edit-btn:hover{opacity:.85;}

/* TOAST */
.toast{
  position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--bg4);border:1px solid var(--border2);
  border-radius:7px;padding:8px 18px;font-size:12px;color:var(--acc2);
  transition:transform .25s;z-index:9999;
}
.toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-left">
    <div class="hdr-badge">🤖</div>
    <div>
      <div class="hdr-title">AI 职业风险敞口图谱</div>
      <div class="hdr-sub">中国大陆 · 821个岗位 · 21个学科门类</div>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="hdr-stat" style="text-align:center">
      <div class="v" id="hv-total">821</div>
      <div class="l">职业总数</div>
    </div>
    <div class="hdr-stat" style="text-align:center">
      <div class="v" id="hv-avg">5.96</div>
      <div class="l">平均风险分</div>
    </div>
    <div class="hdr-stat" style="text-align:center">
      <div class="v" id="hv-high">43.7%</div>
      <div class="l">高危比例 ≥7</div>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="sidebar">
    <div class="sb-body">
      <div class="sb-section">
        <div class="sb-label">搜索职业</div>
        <div class="search-wrap">
          <span class="search-ico">🔍</span>
          <input class="search-inp" id="search" placeholder="职业名称 / 学科…" oninput="doSearch(this.value)">
        </div>
      </div>

      <div class="sb-section">
        <div class="sb-label">颜色图例</div>
        <div class="legend-bar"></div>
        <div class="legend-row">
          <span>0 极低风险</span><span>5 中等</span><span>10 最高</span>
        </div>
      </div>

      <div class="sb-section">
        <div class="sb-label">综合统计</div>
        <div class="stats-grid">
          <div class="stat-box">
            <div class="v" id="sv-avg">5.96</div>
            <div class="l">加权平均分</div>
          </div>
          <div class="stat-box">
            <div class="v" id="sv-high">43.7%</div>
            <div class="l">高危 ≥7</div>
          </div>
          <div class="stat-box">
            <div class="v" id="sv-mid">23.7%</div>
            <div class="l">中等 4-6</div>
          </div>
          <div class="stat-box">
            <div class="v" id="sv-low">32.6%</div>
            <div class="l">低危 ≤3</div>
          </div>
        </div>
        <div class="dist" id="dist-chart"></div>
      </div>

      <div class="sb-section">
        <div class="sb-label">按学科筛选</div>
        <div id="cat-list"></div>
      </div>
    </div>
  </div>

  <div class="main">
    <div class="toolbar">
      <button class="view-btn act" id="btn-tm" onclick="switchView('treemap')">🗺 热力图</button>
      <button class="view-btn" id="btn-tb" onclick="switchView('table')">📋 列表</button>
      <select class="sort-sel" id="sort-sel" onchange="doSort(this.value)">
        <option value="default">按学科门类</option>
        <option value="desc">风险 高→低</option>
        <option value="asc">风险 低→高</option>
        <option value="name">职业名称</option>
      </select>
      <span class="tb-hint">💡 点击职业可手动修改评分</span>
      <span class="tb-status" id="tb-status">显示 821 个职业</span>
    </div>

    <div id="tm-wrap"><svg id="tm-svg"></svg></div>
    <div id="tbl-wrap">
      <table class="dtable">
        <thead>
          <tr>
            <th onclick="doSort('name')">职业名称</th>
            <th onclick="doSort('cat')">学科门类</th>
            <th onclick="doSort('desc')" style="width:80px">风险分</th>
            <th style="width:90px">风险等级</th>
            <th style="width:150px">风险程度</th>
          </tr>
        </thead>
        <tbody id="tbl-body"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="tip" id="tip"></div>
<div class="detail" id="detail"><button class="d-close" onclick="closeDetail()">✕</button><div id="d-content"></div></div>
<div class="toast" id="toast"></div>

<script>

// ===== RISK LEVELS =====
const RLEVELS=[
  {max:1,label:"极低风险",color:"#22c55e",bg:"rgba(34,197,94,.12)"},
  {max:3,label:"低风险",color:"#86efac",bg:"rgba(134,239,172,.1)"},
  {max:5,label:"中等风险",color:"#fbbf24",bg:"rgba(251,191,36,.12)"},
  {max:7,label:"高风险",color:"#f97316",bg:"rgba(249,115,22,.12)"},
  {max:9,label:"极高风险",color:"#ef4444",bg:"rgba(239,68,68,.12)"},
  {max:10,label:"最高风险",color:"#dc2626",bg:"rgba(220,38,38,.15)"}
];

function getRisk(s){return RLEVELS.find(r=>s<=r.max)||RLEVELS[RLEVELS.length-1];}

function scoreColor(s){
  if(s===null)return"#1e2d40";
  const t=s/10;
  if(t<=.5){
    const t2=t*2;
    return`rgb(${Math.round(34+200*t2)},${Math.round(197-18*t2)},${Math.round(94-86*t2)})`;
  }else{
    const t2=(t-.5)*2;
    return`rgb(${Math.round(234+5*t2)},${Math.round(179-111*t2)},${Math.round(8+60*t2)})`;
  }
}

// ===== STATE =====
let occ=DATA.map(d=>({...d}));// mutable copy
let selCat=null,query="",sortMode="default",curView="treemap",curDetail=null;

function getDisplay(){
  return occ.filter(o=>{
    if(selCat&&o.cat!==selCat)return false;
    if(query&&!o.name.includes(query)&&!o.cat.includes(query))return false;
    return true;
  });
}

function getSorted(arr){
  let a=[...arr];
  if(sortMode==="desc")a.sort((x,y)=>y.score-x.score);
  else if(sortMode==="asc")a.sort((x,y)=>x.score-y.score);
  else if(sortMode==="name")a.sort((x,y)=>x.name.localeCompare(y.name));
  else a.sort((x,y)=>x.cat.localeCompare(y.cat));
  return a;
}

// ===== TREEMAP =====
function renderTreemap(){
  const C=document.getElementById("tm-wrap");
  const W=C.clientWidth,H=C.clientHeight;
  if(!W||!H)return;
  const disp=getSorted(getDisplay());
  const groups={};
  disp.forEach(o=>{if(!groups[o.cat])groups[o.cat]=[];groups[o.cat].push(o);});

  const hdata={name:"root",children:Object.entries(groups).map(([cat,items])=>({
    name:cat,children:items.map(o=>({name:o.name,value:1,data:o}))
  }))};

  const root=d3.hierarchy(hdata).sum(d=>d.value||0);
  d3.treemap().size([W,H]).paddingOuter(2).paddingTop(18).paddingInner(1).round(true)(root);

  const svg=d3.select("#tm-svg").attr("width",W).attr("height",H);
  svg.selectAll("*").remove();

  (root.children||[]).forEach(cn=>{
    const cc=CCOLORS[cn.data.name]||"#4a5a70";
    const g=svg.append("g");
    g.append("rect")
      .attr("x",cn.x0).attr("y",cn.y0)
      .attr("width",cn.x1-cn.x0).attr("height",cn.y1-cn.y0)
      .attr("fill","rgba(255,255,255,.02)").attr("rx",3);
    const cw=cn.x1-cn.x0;
    if(cw>30){
      g.append("text").attr("x",cn.x0+4).attr("y",cn.y0+13)
        .attr("fill",cc).attr("font-size",9).attr("font-weight","700")
        .attr("opacity",.85)
        .text(cn.data.name.length>8?cn.data.name.slice(0,8)+"…":cn.data.name);
    }
    cn.leaves().forEach(leaf=>{
      const o=leaf.data.data;
      const lw=leaf.x1-leaf.x0,lh=leaf.y1-leaf.y0;
      if(lw<2||lh<2)return;
      const cell=g.append("g").attr("class","tm-cell").style("cursor","pointer")
        .on("mouseover",ev=>showTip(ev,o))
        .on("mousemove",ev=>moveTip(ev))
        .on("mouseout",hideTip)
        .on("click",()=>showDetail(o));
      const fc=scoreColor(o.score);
      cell.append("rect")
        .attr("x",leaf.x0+.5).attr("y",leaf.y0+.5)
        .attr("width",Math.max(0,lw-1)).attr("height",Math.max(0,lh-1))
        .attr("fill",fc).attr("opacity",.82).attr("rx",2);
      // top progress line
      if(lw>18&&lh>10){
        cell.append("rect")
          .attr("x",leaf.x0+.5).attr("y",leaf.y0+.5)
          .attr("width",Math.max(0,lw-1)*(o.score/10))
          .attr("height",2).attr("fill","rgba(255,255,255,.35)").attr("rx",1);
      }
      if(lw>26&&lh>14){
        const fs=Math.min(11,Math.max(7,Math.min(lw/5,lh/2.5)));
        const lbl=lw>48?o.name:(o.name.length>4?o.name.slice(0,4)+"…":o.name);
        cell.append("text")
          .attr("x",leaf.x0+lw/2).attr("y",leaf.y0+lh/2+fs*.35)
          .attr("text-anchor","middle").attr("fill","rgba(255,255,255,.92)")
          .attr("font-size",fs).attr("font-weight","600")
          .attr("font-family","Noto Sans SC,sans-serif").text(lbl);
        if(lh>26){
          cell.append("text")
            .attr("x",leaf.x0+lw/2).attr("y",leaf.y0+lh/2+fs*.35+fs+1)
            .attr("text-anchor","middle").attr("fill","rgba(255,255,255,.65)")
            .attr("font-size",Math.min(9,fs-1)).attr("font-family","JetBrains Mono,monospace")
            .text(o.score.toFixed(1));
        }
      }
    });
  });
  updateStatus();
}

// ===== TABLE =====
function renderTable(){
  const disp=getSorted(getDisplay());
  const tb=document.getElementById("tbl-body");
  tb.innerHTML="";
  disp.forEach(o=>{
    const rl=getRisk(o.score);
    const sc=scoreColor(o.score);
    const cc=CCOLORS[o.cat]||"#4a5a70";
    const tr=document.createElement("tr");
    tr.style.cursor="pointer";tr.onclick=()=>showDetail(o);
    tr.innerHTML=`
      <td style="font-weight:500;color:#d4dde8">${o.name}</td>
      <td><span style="color:${cc};font-size:11px">${o.cat}</span></td>
      <td><span class="score-chip" style="background:${sc}">${o.score.toFixed(1)}</span></td>
      <td><span style="color:${rl.color};font-size:11px;font-weight:600">${rl.label}</span></td>
      <td><div class="risk-bar-row"><div class="risk-bar-bg"><div class="risk-bar-f" style="width:${o.score*10}%;background:${sc}"></div></div></div></td>
    `;
    tb.appendChild(tr);
  });
  updateStatus();
}

function render(){
  if(curView==="treemap")renderTreemap();
  else renderTable();
  renderCategories();
  updateStats();
}

    <div class="tip-cat">${o.cat}</div>

  const t=document.getElementById("tip");

  t.style.left=x+"px";t.style.top=y+"px";
}
function hideTip(){document.getElementById("tip").classList.remove("on");}

    <span class="d-badge" style="color:${rl.color};background:${rl.bg};border-color:${rl.color}33">${rl.label}</span>
    
    <div class="d-sec">
      <div class="d-sec-t">风险程度</div>
      <div class="d-meter">
        <span style="font-size:10px;color:var(--text3);width:14px">0</span>
        <div class="d-meter-bg"><div class="d-meter-f" style="width:${o.score*10}%;background:${sc}"></div></div>
        <span style="font-size:10px;color:var(--text3);width:20px">10</span>
      </div>
    </div>

    <div class="d-sec">
      <div class="d-sec-t">评分依据</div>
      <div class="d-sec-body">${o.rationale}</div>
    </div>

    <div class="d-sec">
      <div class="d-sec-t">风险说明</div>
      <div class="d-sec-body">${EXPL[Math.round(o.score)]||EXPL[5]}</div>
    </div>

    <div class="d-sec">
      <div class="d-sec-t">手动修改评分</div>
      <div class="d-edit-row">
        <span class="d-edit-label">新分值 (0–10)：</span>
        <input class="d-edit-inp" type="number" id="edit-inp" min="0" max="10" step="0.5" value="${o.score}">
        <button class="d-edit-btn" onclick="applyEdit()">确认</button>
      </div>
    </div>
  `;

  if(sims.length){
    html+=`<div class="d-sec"><div class="d-sec-t">同类职业对比</div>`;
    sims.forEach(s=>{
      html+=`<div class="d-similar-item" onclick="showDetail(occ.find(x=>x.id===${s.id}))">
        <span style="font-size:11px;color:var(--text2)">${s.name}</span>
        <span style="font-family:var(--mono);font-size:12px;font-weight:700;color:${scoreColor(s.score)}">${s.score.toFixed(1)}</span>
      </div>`;
    });
    html+=`</div>`;
  }

  document.getElementById("d-content").innerHTML=html;
  document.getElementById("detail").classList.add("open");
}

function applyEdit(){
  if(!curDetail)return;
  const inp=document.getElementById("edit-inp");
  const v=parseFloat(inp.value);
  if(isNaN(v)||v<0||v>10){showToast("⚠️ 请输入 0–10 之间的数值");return;}
  curDetail.score=parseFloat(v.toFixed(1));
  showToast(`✅ 已将「${curDetail.name}」评分更新为 ${curDetail.score}`);
  render();
  showDetail(curDetail);// refresh panel
}

function closeDetail(){document.getElementById("detail").classList.remove("open");curDetail=null;}

// ===== CATEGORIES =====
function renderCategories(){
  const cats=[...new Set(occ.map(o=>o.cat))];
  const list=document.getElementById("cat-list");
  list.innerHTML="";
  const all=document.createElement("div");
  all.className="cat-all"+(selCat===null?" active":"");
  all.innerHTML=`<div class="cat-dot" style="background:#4a5a70"></div><span class="cat-name">全部职业</span><span class="cat-cnt">${occ.length}</span>`;
  all.onclick=()=>{selCat=null;renderCategories();render();};
  list.appendChild(all);
  cats.forEach(cat=>{
    const items=occ.filter(o=>o.cat===cat);
    const avg=(items.reduce((s,o)=>s+o.score,0)/items.length);
    const cc=CCOLORS[cat]||"#4a5a70";
    const el=document.createElement("div");
    el.className="cat-item"+(selCat===cat?" active":"");
    el.innerHTML=`
      <div class="cat-dot" style="background:${cc}"></div>
      <span class="cat-name">${cat}</span>
      <div class="cat-meta">
        <span class="cat-cnt">${items.length}</span>
        <span class="cat-avg" style="color:${scoreColor(avg)}">${avg.toFixed(1)}</span>
      </div>
    `;
    el.onclick=()=>{selCat=(selCat===cat?null:cat);renderCategories();render();};
    list.appendChild(el);
  });
}

// ===== STATS =====
function updateStats(){
  const d=getDisplay();
  const n=d.length;
  if(!n)return;
  const avg=(d.reduce((s,o)=>s+o.score,0)/n);
  const high=d.filter(o=>o.score>=7).length;
  const mid=d.filter(o=>o.score>=4&&o.score<7).length;
  const low=d.filter(o=>o.score<4).length;
  document.getElementById("sv-avg").textContent=avg.toFixed(2);
  document.getElementById("sv-high").textContent=((high/n)*100).toFixed(1)+"%";
  document.getElementById("sv-mid").textContent=((mid/n)*100).toFixed(1)+"%";
  document.getElementById("sv-low").textContent=((low/n)*100).toFixed(1)+"%";
  document.getElementById("hv-avg").textContent=avg.toFixed(2);
  document.getElementById("hv-high").textContent=((high/n)*100).toFixed(1)+"%";

  // distribution
  const bins=Array(11).fill(0);
  d.forEach(o=>bins[Math.min(10,Math.round(o.score))]++);
  const mx=Math.max(...bins,1);
  const chart=document.getElementById("dist-chart");
  chart.innerHTML="";
  bins.forEach((cnt,score)=>{
    if(cnt===0)return;
    const pct=(cnt/mx*100).toFixed(0);
    const row=document.createElement("div");
    row.className="dist-row";
    row.innerHTML=`
      <span class="dist-num">${score}</span>
      <div class="dist-bg"><div class="dist-fill" style="width:${pct}%;background:${scoreColor(score)}"></div></div>
      <span class="dist-cnt">${cnt}</span>
    `;
    chart.appendChild(row);
  });
}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2800);
}

// ===== RESIZE =====
window.addEventListener("resize",()=>{if(curView==="treemap")renderTreemap();});

// ===== INIT =====
renderCategories();
render();
</script>
</body>
</html>
